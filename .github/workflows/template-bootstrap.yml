name: Template Bootstrap

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write 

jobs:
  bootstrap:
    if: github.repository != 'ValaFoundation/library-template'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run bootstrap when template defaults are still present
        shell: bash
        run: |
          set -euo pipefail

          if grep -q "project('vala-library-template'" meson.build; then
            chmod +x bootstrap-template.sh
            ./bootstrap-template.sh "${GITHUB_REPOSITORY##*/}"
          else
            echo "Template already bootstrapped."
          fi

          if [ -f ".github/workflows/template-bootstrap.yml" ]; then
            rm -f ".github/workflows/template-bootstrap.yml"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bootstrap template defaults"
          title: "Initial template bootstrap"
          body: |
            This is an automated Pull Request generated by the project template.
            
            It renames the project according to the repository name (`${{ github.event.repository.name }}`) and cleans up the bootstrap scripts.
            
            **Next steps:**
            1. Merge this Pull Request.
            2. Run local setup (`meson setup builddir`).
          branch: "template-bootstrap"
          delete-branch: true
