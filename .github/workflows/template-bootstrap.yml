name: Template Bootstrap

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  bootstrap:
    if: github.repository != 'ValaFoundation/library-template'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run bootstrap when template defaults are still present
        shell: bash
        run: |
          set -euo pipefail

          if grep -q "project('vala-library-template'" meson.build; then
            chmod +x bootstrap-template.sh
            ./bootstrap-template.sh "${GITHUB_REPOSITORY##*/}"
          else
            echo "Template already bootstrapped."
          fi

          if [ -f ".github/workflows/template-bootstrap.yml" ]; then
            rm -f ".github/workflows/template-bootstrap.yml"
          fi

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bootstrap template defaults"
          git push
